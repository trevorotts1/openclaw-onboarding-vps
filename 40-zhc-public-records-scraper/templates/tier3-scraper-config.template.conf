# Tier 3 scraper config TEMPLATE — Skill 40 (ZHC Public Records Scraper)
#
# Copy this for a county with no Tier 1 entry and no Tier 2 adapter. Fill it in,
# confirm robots.txt + the target's Terms of Service permit automated access,
# set ROBOTS_OK=1, then validate + promote with:
#   scripts/03-build-scraper-config.sh --from /path/to/this.conf
#
# Only a VALIDATED config goes live (well-formed URL, robots.txt not disallowing
# the path, required keys present, ROBOTS_OK attestation). An invalid config is
# never promoted and the county stays Tier 4 (honest gap) — never fabrication.

# Jurisdiction (used to key the config file: <state>-<county>.conf)
COUNTY=CHANGE-ME
STATE=ZZ

# The county portal search page (http/https, reachable)
BASE_URL=https://CHANGE-ME.example.gov/search

# How the search form submits
SEARCH_METHOD=GET          # GET or POST
SEARCH_PARAM=address       # the query field name (e.g. address / parcel / name)

# Where results live + which fields to extract (CSS/XPath-ish selectors)
RESULT_SELECTOR=table.results tr
FIELD_owner=td.owner
FIELD_parcel=td.parcel
FIELD_status=td.status

# Operator attestation: robots.txt AND the target's ToS permit this automated use.
# The validator also checks robots.txt, but this attestation is REQUIRED.
ROBOTS_OK=0
