name: QC static checks

# Wave 5.2 of the post-analysis remediation. The full qc-system-integrity.sh
# needs a live OpenClaw install (~/.openclaw/ or /data/.openclaw/) so it can't
# run in CI as-is. This job runs the static subset — invariants that are
# detectable from the repo alone — so we catch regressions on every push:
#
#   • All Python scripts in shared-utils/ and active skills parse without error
#   • DEFAULT_WEIGHTS in adaptive_weights.py sums to 1.0
#   • company-config.template.json is valid JSON (schema v2.0)
#   • persona-categories.json is valid JSON
#   • No Anthropic model strings in Skill 22/23 scripts
#   • No flat-constant scoring (0.7/0.7/0.8/0.8) lingering in persona-selector-v2.py
#
# Triggers on every push to main and every PR targeting main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qc-static:
    name: QC static invariants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax (shared-utils + Skill 22/23 scripts)
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          for f in $(find shared-utils 22-book-to-persona-coaching-leadership-system 23-ai-workforce-blueprint -type f -name '*.py'); do
            python3 -c "import ast; ast.parse(open('$f').read())" || { echo "  ✗ syntax: $f"; fail=1; }
          done
          [ $fail -eq 0 ] && echo "✓ Python syntax OK across all skill scripts"
          exit $fail

      - name: DEFAULT_WEIGHTS sums to 1.0
        shell: python {0}
        run: |
          import sys
          sys.path.insert(0, 'shared-utils')
          from adaptive_weights import DEFAULT_WEIGHTS
          total = sum(DEFAULT_WEIGHTS.values())
          if not (0.999 <= total <= 1.001):
              print(f"✗ DEFAULT_WEIGHTS sums to {total}, expected 1.0")
              sys.exit(1)
          print(f"✓ DEFAULT_WEIGHTS sums to {total}")

      - name: company-config template is valid JSON
        shell: bash
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('23-ai-workforce-blueprint/templates/company-config.template.json'))
          required = ['schema_version', 'mission', 'owner_values', 'company_kpis', 'dept_kpis']
          missing = [k for k in required if k not in d]
          if missing:
              print(f'✗ missing required fields: {missing}'); sys.exit(1)
          if d['schema_version'] != '2.0':
              print(f'✗ schema_version is {d[\"schema_version\"]}, expected 2.0'); sys.exit(1)
          print('✓ company-config template valid (schema v2.0)')
          "

      - name: No Anthropic model strings in Skill 22/23 scripts
        shell: bash
        run: |
          set -uo pipefail
          if grep -rEn "'(claude-[a-z0-9-]+|anthropic/[a-z0-9-]+)'" 22-book-to-persona-coaching-leadership-system/scripts 23-ai-workforce-blueprint/scripts shared-utils/ 2>&1; then
            echo "✗ Found Anthropic model string(s) above"; exit 1
          fi
          echo "✓ No Anthropic model strings in pipeline scripts"

      - name: persona-selector-v2 no longer uses flat scoring constants
        shell: bash
        run: |
          set -uo pipefail
          # Check that _heuristic_layer_scores is structured (reads cc fields) not flat 0.7/0.8.
          # Specifically: should NOT contain `mission_score = 0.8` or `dept_score = 0.7` as bare assignments.
          if grep -E "^\s*(mission_score|values_score|dept_score|company_kpi_score)\s*=\s*0\.[78](\s|$)" 23-ai-workforce-blueprint/scripts/persona-selector-v2.py 2>&1 | grep -v "= 0\.6"; then
            echo "✗ Flat-constant scoring detected in persona-selector-v2.py"; exit 1
          fi
          echo "✓ No flat-constant scoring in persona-selector-v2.py"

      - name: llm_score module loads
        shell: bash
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'shared-utils')
          from llm_score import score_layer, summarize_persona_blueprint, _cache_key, NEUTRAL_FALLBACK_SCORE
          assert callable(score_layer)
          assert callable(summarize_persona_blueprint)
          assert NEUTRAL_FALLBACK_SCORE == 0.6
          k = _cache_key('test-persona', 'mission', 'summary', 'context')
          assert len(k) == 64
          print('✓ llm_score module imports + cache key generation OK')
          "

      - name: Skill 38 GHL RAW BODY 23-key rule
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce the 23-key flat placeholder-free GHL body rule across
          # every object-A example in references/ + templates/ + scripts/
          # (including references/v6.0-source-playbook.md).
          bash 38-conversational-ai-system/scripts/qc-23-key-bodies.sh
          echo "✓ All Skill 38 GHL RAW BODY examples satisfy the 23-key rule"

      - name: Skill 38 trinity-registry reconciliation (bullet + table fixtures)
        shell: bash
        run: |
          set -uo pipefail
          # Prove qc-trinity-registry.sh reconciles the BULLET registry the
          # installer actually writes (not just the documented table) — catches
          # registered-but-missing-files and file-present-but-unregistered rows.
          bash 38-conversational-ai-system/scripts/qc-trinity-registry-test.sh
          echo "✓ qc-trinity-registry reconciles bullet and table registries"

      - name: Skill 38 MANDATORY GHL send-directive
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce that EVERY GHL inbound server-mapping messageTemplate
          # (the installer's canonical template + the playbook/reference examples)
          # carries the mandatory send-directive: SEND via the GHL Conversations
          # API, drafting-is-NOT-sending, do-not-end-turn-until-messageId. Drafting
          # is not sending — a hook without this clause silently drops the reply.
          bash 38-conversational-ai-system/scripts/qc-send-directive.sh
          echo "✓ All Skill 38 GHL server-mapping messageTemplates carry the SEND-directive"

      - name: Skill 38 MANDATORY conversation-memory (read-before + append-after)
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce that EVERY GHL inbound server-mapping messageTemplate
          # (installer canonical + playbook/reference examples) READS the contact's
          # conversation log BEFORE replying and APPENDS the inbound+reply AFTER
          # sending. GHL inbound hook sessions are SINGLE-TURN / stateless — the
          # per-contact log IS the agent's only cross-message memory; a template
          # that drops either step makes the agent forget mid-conversation.
          bash 38-conversational-ai-system/scripts/qc-conversation-memory.sh
          echo "✓ All Skill 38 GHL server-mapping messageTemplates READ-before and APPEND-after the conversation log"

      - name: Skill 38 per-playbook human-facing DOC gate (fixtures)
        shell: bash
        run: |
          set -euo pipefail
          # Machine-enforce the per-playbook human-facing DOC deliverable: when a
          # conversation playbook is created, a human-facing copy MUST be created in
          # the CLIENT's account (Notion -> Google Docs -> plain text) and its
          # URL/path RECORDED (registry row or run-manifest playbookDocs[]). On a
          # recent client this step was SKIPPED -- the agent scaffolded the playbook
          # locally and reported "clean" but never created the client's Notion doc.
          # The live gate (qc-playbook-doc.sh) runs against a client's installed
          # conversation-workflows/ folder, so CI proves it via the fixture suite
          # (mirroring qc-trinity-registry-test.sh): a playbook with no recorded doc
          # FAILS; an empty folder is NO_PLAYBOOKS (exit 2), never a blind pass.
          bash 38-conversational-ai-system/scripts/qc-playbook-doc-test.sh
          echo "✓ qc-playbook-doc enforces the per-playbook human-facing doc deliverable"

      - name: Skill 38 client reference sheet copy-paste artifacts
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce that the generated CLIENT REFERENCE SHEET is bulletproof:
          # it must LEAD with a literal "🚀 Quick Start" section and STILL carry a
          # full "Reference & explanation" section after it (both, in that order);
          # each copyable value must be in its OWN code block — the Authorization KEY
          # and the "Bearer <token>" VALUE in SEPARATE blocks (never combined), and
          # the Content-Type KEY and "application/json" VALUE in SEPARATE blocks (50+
          # clients copy each field individually); plus the copyable ```json GHL Raw
          # Body, the hook URL, the manual Custom-Webhook fill steps, the
          # create-tag-FIRST + "Settings → Tags" instruction, and the post-build
          # verification section (Trigger / Custom Webhook / Publish, including the
          # blank/non-existent-tag-in-a-"does not contain"-filter gotcha that stranded
          # a live client, Teresa). qc-reference-sheet.sh drives
          # 21-generate-client-reference-sheet.sh in a sandbox (no openclaw on PATH →
          # offline Layer-3 markdown) and FAILS if any marker is missing, so a
          # template/script regression that drops them fails the build. BASH (with an
          # inline grep/awk core), so it respects the .py claude-/anthropic ban.
          bash 38-conversational-ai-system/scripts/qc-reference-sheet.sh
          echo "✓ Skill 38 client reference sheet: 🚀 Quick Start + after-it explanation + separate Authorization/Content-Type key+value blocks + bearer token + copyable Raw Body JSON + hook URL + manual-fill + create-tag-first + post-build verification"

      - name: Skill 38 MANDATORY Telegram doc-delivery (gated, transcript-grep)
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce the un-skippable Telegram doc-delivery step. The
          # install is NOT complete until the client has been SENT their
          # Quick-Start / Notion doc LINK via Telegram. qc-notify-client-doc.sh
          # asserts scripts/22-notify-client-doc.sh exists, GREPS THE TRANSCRIPTS
          # (agents/*/sessions/*.jsonl, not sessions.json keys only — the Teresa
          # lesson), is GATED (records clientDocDelivered + exits non-zero on
          # miss/failure — never a silent skip), sends via the OpenClaw gateway
          # (never api.telegram.org direct), and is wired into the QC checklist +
          # INSTRUCTIONS. Also smoke-test the delivery script itself: a fixture
          # transcript must resolve the most-frequent non-operator chat id, and a
          # transcript with only the operator id must FAIL (exit 1) and record
          # clientDocDelivered=false. BASH only (respects the .py claude-/anthropic ban).
          bash 38-conversational-ai-system/scripts/qc-notify-client-doc.sh
          # --- fixture smoke test (success path: client id wins) ---
          tdir="$(mktemp -d)"
          mkdir -p "$tdir/home/.openclaw/agents/main/sessions" "$tdir/master"
          jl="$tdir/home/.openclaw/agents/main/sessions/s1.jsonl"
          printf '%s\n' '{"meta":{"chat":{"id":5252140759}},"text":"operator"}' >  "$jl"
          printf '%s\n' '{"meta":{"chat":{"id":7029068588}},"text":"client"}'   >> "$jl"
          printf '%s\n' '{"key":"agent:main:telegram:direct:7029068588"}'        >> "$jl"
          printf '%s\n' '{"from":{"id":7029068588},"chatId":7029068588}'         >> "$jl"
          echo "https://notion.so/demo-abc" > "$tdir/master/.notion-reference-page-url"
          printf '# Run Manifest\n' > "$tdir/master/run-manifest-20260529-000000.md"
          out="$(HOME="$tdir/home" MASTER_FILES_DIR="$tdir/master" OPENCLAW_HOME="$tdir/home/.openclaw" \
            bash 38-conversational-ai-system/scripts/22-notify-client-doc.sh --dry-run --json)"
          echo "$out" | grep -q '"chat":"7029068588"' || { echo "✗ transcript-grep did not pick the client id"; exit 1; }
          echo "$out" | grep -q '"clientDocDelivered":true' || { echo "✗ dry-run did not record delivered=true"; exit 1; }
          # --- fixture smoke test (failure path: only operator id => exit 1, false) ---
          tdir2="$(mktemp -d)"
          mkdir -p "$tdir2/home/.openclaw/agents/main/sessions" "$tdir2/master"
          printf '{"meta":{"chat":{"id":5252140759}}}\n' > "$tdir2/home/.openclaw/agents/main/sessions/s1.jsonl"
          echo "https://notion.so/demo-xyz" > "$tdir2/master/.notion-reference-page-url"
          printf '# Run Manifest\n' > "$tdir2/master/run-manifest-20260529-000000.md"
          rc=0
          HOME="$tdir2/home" MASTER_FILES_DIR="$tdir2/master" OPENCLAW_HOME="$tdir2/home/.openclaw" \
            bash 38-conversational-ai-system/scripts/22-notify-client-doc.sh >/dev/null 2>&1 || rc=$?
          [ "$rc" -eq 1 ] || { echo "✗ no-client-chat path should exit 1, got $rc"; exit 1; }
          grep -q 'clientDocDelivered=false' "$tdir2/master/run-manifest-20260529-000000.md" || { echo "✗ no-chat path did not record clientDocDelivered=false"; exit 1; }
          rm -rf "$tdir" "$tdir2"
          echo "✓ Skill 38 Telegram doc-delivery is mandatory, transcript-grep-based, gated, and wired"

      - name: Skill 38 backend-ready gate (no-config => SKIP, not fail)
        shell: bash
        run: |
          set -uo pipefail
          # The backend-ready gate (hooks.mappings live + deliver:false + a working
          # model + healthz 200) is a LIVE check. In CI there is no install, so it
          # must exit 3 (NO_CONFIG) — a SKIP, never a false failure. Assert that.
          rc=0
          bash 38-conversational-ai-system/scripts/qc-backend-ready.sh --config /nonexistent/openclaw.json >/dev/null 2>&1 || rc=$?
          [ "$rc" -eq 3 ] || { echo "✗ backend-ready with no config should exit 3 (SKIP), got $rc"; exit 1; }
          echo "✓ Skill 38 backend-ready gate exits 3 (SKIP) when no install is present"

      - name: Skill 38 config schema-safety (no config-invalidating install scripts)
        shell: bash
        run: |
          set -uo pipefail
          # Machine-enforce that NO Skill 38 install script writes a config shape
          # that fails `openclaw config validate` on 2026.5.27, and that none uses
          # jq syntax jq 1.7 rejects. Catches the three v1.4.11 install-script bugs
          # found on a live box: (1) a legacy `.cron.jobs` write (crons must go
          # through `openclaw cron add`), (2) unsupported `agents.defaults.async/
          # .batch` model keys, (3) a `.hooks //= {};` jq statement (jq 1.7 rejects
          # the top-level `;`). A regression that reintroduces any of them fails CI.
          bash 38-conversational-ai-system/scripts/qc-config-schema-safety.sh
          echo "✓ Skill 38 install scripts are config-schema-safe (no .cron.jobs / agents.defaults.async-batch / jq '//= …;')"
