                  -not -name '00-INDEX.md' -print \
                | sed 's#.*/##' \
                | grep -Ev '^PA-[0-9]{2}-[0-9]{2}-[A-Za-z0-9]+(-[A-Za-z0-9]+)*\.md$' || true)
          if [ -n "$bad" ]; then
            echo "✗ Non-conforming SOP filename(s) (expected PA-NN-NN-slug.md):"
            echo "$bad" | sed 's/^/    /'
            exit 1
          fi
          echo "✓ All 162 Skill 42 SOPs follow PA-NN-NN-slug.md"

      # PRD 1.9: Path-authority guard — no Python script may define a top-level
      # WORKSPACE_ROOT =, ZHC_ROOTS =, or MASTER_FILES = constant outside of a
      # try/except block or function.  All path resolution goes through
      # get_openclaw_paths() in shared-utils/detect_platform.py.
      # Shell scripts are excluded (they legitimately use WORKSPACE_ROOT for
      # OpenClaw workspace, not the company root).
      # Exclusions: migrate/archive scripts, detect_platform.py itself, the
      # HEARTBEAT/check scripts that ARE the canonical resolver, and fallback
      # lines inside except/else blocks.
      - name: PRD 1.9 path-authority guard (no rogue top-level WORKSPACE_ROOT / ZHC_ROOTS / MASTER_FILES in Python)
        shell: bash
        run: |
          set -uo pipefail
          # Only scan Python files (shell WORKSPACE_ROOT is the OpenClaw workspace, not a company root).
          # Pattern: top-level bare assignment (zero indent, not inside try/except/def/class).
          # We look for lines starting with the constant name (no leading whitespace).
          ROGUE=$(grep -rn \
            --include="*.py" \
            -E '^(WORKSPACE_ROOT|ZHC_ROOTS|MASTER_FILES)\s*=' \
            . \
            | grep -v '\.git/' \
            | grep -v 'archive/' \
            | grep -v 'migrate' \
            | grep -v 'shared-utils/detect_platform.py' \
            | grep -v 'scripts/check-company-root' \
            || true)
          if [ -n "$ROGUE" ]; then
            echo "✗ PRD 1.9 violation — Python script(s) define a top-level path root constant:"
            echo "$ROGUE" | sed 's/^/    /'
            echo ""
            echo "Fix: remove the constant and call get_openclaw_paths() from shared-utils/detect_platform.py."
            echo "Fallback assignments inside try/except blocks are OK (indented — won't match this guard)."
            exit 1
          fi
          echo "✓ PRD 1.9 path-authority guard: no rogue top-level WORKSPACE_ROOT / ZHC_ROOTS / MASTER_FILES in Python"

      # PRD 1.10: migration script + runner present and Python-parseable; test harness
      # exists; dry-run invocable (verify the script can be called and exits cleanly
      # without a real OpenClaw install by using the MASTER_FILES_DIR fixture pattern
      # that the test harness documents).
      - name: PRD 1.10 migration script present and parseable
        shell: bash
        run: |
          set -euo pipefail
          # 1. Script and runner must exist
          [ -f scripts/migrate-zhc-to-master-files.sh ] \
            || { echo "✗ scripts/migrate-zhc-to-master-files.sh missing"; exit 1; }
          [ -f shared-utils/migrate_zhc_runner.py ] \
            || { echo "✗ shared-utils/migrate_zhc_runner.py missing"; exit 1; }
          [ -f scripts/test-migrate-zhc.sh ] \
            || { echo "✗ scripts/test-migrate-zhc.sh missing"; exit 1; }
          echo "✓ Migration script + runner + test harness present"

          # 2. Python runner parses without error
          python3 -c "import ast; ast.parse(open('shared-utils/migrate_zhc_runner.py').read())" \
            || { echo "✗ migrate_zhc_runner.py has syntax errors"; exit 1; }
          echo "✓ migrate_zhc_runner.py syntax OK"

          # 3. Runner accepts --help without needing a real install
          python3 shared-utils/migrate_zhc_runner.py --help 2>&1 | grep -q "shared-utils\|repo-root" \
            || { echo "✗ runner --help did not show expected args"; exit 1; }
          echo "✓ migrate_zhc_runner.py --help OK"

          # 4. Shell script is executable or can be run via bash (CI checkout may strip x bit)
          bash scripts/migrate-zhc-to-master-files.sh --help 2>&1 | grep -q "dry-run\|apply" \
            || { echo "✗ migrate-zhc-to-master-files.sh --help output unexpected"; exit 1; }
          echo "✓ migrate-zhc-to-master-files.sh --help OK"

          echo "✓ PRD 1.10 migration artefacts present and parseable"

      # PRD 1.8: One embedding engine — shared-utils/embedding_engine.py is the
      # single implementation. Wrappers in scripts/, skill 22, and skill 23 must be
      # 3-line shims that import it. projects/gemini-migration/ must not exist.
      # No per-wrapper logic may survive (each wrapper must be <= 4 lines).
      - name: PRD 1.8 embedding engine — single implementation + no gemini-migration
        shell: bash
        run: |
          set -euo pipefail

          # 1. shared-utils/embedding_engine.py must exist and parse
          [ -f shared-utils/embedding_engine.py ] \
            || { echo "✗ shared-utils/embedding_engine.py missing"; exit 1; }
          python3 -c "import ast; ast.parse(open('shared-utils/embedding_engine.py').read())" \
            || { echo "✗ embedding_engine.py has syntax errors"; exit 1; }
          echo "✓ embedding_engine.py present and parses"

          # 2. GEMINI_MODEL must be defined exactly once (in embedding_engine.py only)
          MODEL_DEFS=$(grep -rn \
            --include="*.py" \
            -E '^GEMINI_MODEL\s*=' \
            . \
            | grep -v '\.git/' \
            | grep -v 'shared-utils/embedding_engine.py' \
            || true)
          if [ -n "$MODEL_DEFS" ]; then
            echo "✗ PRD 1.8 violation — GEMINI_MODEL defined outside embedding_engine.py:"
            echo "$MODEL_DEFS" | sed 's/^/    /'
            exit 1
          fi
          echo "✓ GEMINI_MODEL defined in exactly one place (embedding_engine.py)"

          # 3. Wrappers must be short (PRD 1.8: 3-line wrappers)
          #    Accept <= 6 lines to allow shebang + blank line + comment + import + call
          for f in \
            scripts/gemini-indexer.py \
            scripts/gemini-search.py \
            "22-book-to-persona-coaching-leadership-system/pipeline/gemini-indexer.py" \
            "22-book-to-persona-coaching-leadership-system/pipeline/gemini-search.py" \
            "23-ai-workforce-blueprint/scripts/gemini-indexer.py" \
            "23-ai-workforce-blueprint/scripts/gemini-search.py"; do
            [ -f "$f" ] || { echo "✗ wrapper missing: $f"; exit 1; }
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 6 ]; then
              echo "✗ wrapper too long ($lines lines, expected <=6): $f"
              exit 1
            fi
            # Must import from embedding_engine
            grep -q "embedding_engine" "$f" \
              || { echo "✗ wrapper does not import embedding_engine: $f"; exit 1; }
          done
          echo "✓ All 6 gemini wrappers are short and import embedding_engine"

          # 4. projects/gemini-migration/ must NOT exist
          if [ -d "projects/gemini-migration" ]; then
            echo "✗ projects/gemini-migration/ still present — PRD 1.8 requires deleting this finished migration artifact"
            exit 1
          fi
          echo "✓ projects/gemini-migration/ absent (deleted per PRD 1.8)"

          # 5. embedding_engine.py must define provider/model/dim columns (schema check)
          python3 -c "
          import ast, sys
          src = open('shared-utils/embedding_engine.py').read()
          if 'provider' not in src or 'model' not in src or 'dim' not in src:
              print('✗ embedding_engine.py missing provider/model/dim references')
              sys.exit(1)
          if 'keyword_fallback_search' not in src:
              print('✗ embedding_engine.py missing keyword_fallback_search')
              sys.exit(1)
          if 'get_db_index_provider' not in src:
              print('✗ embedding_engine.py missing get_db_index_provider')
              sys.exit(1)
          if 'provider_hint' not in src:
              print('✗ embedding_engine.py missing provider_hint guard (cross-provider protection)')
              sys.exit(1)
          print('✓ embedding_engine.py contains provider/model/dim, keyword fallback, and cross-provider guard')
          "
          echo "✓ PRD 1.8 embedding engine checks complete"

      # PRD 1.11: fleet-refresh artefacts present and parseable; cc-compat.json
      # validity; injected-core-files guard; version-consistency extension.
      - name: PRD 1.11 fleet-refresh artefacts present and parseable
        shell: bash
        run: |
          set -euo pipefail

          # 1. Required artefacts must exist
          for f in \
            scripts/fleet-refresh.sh \
            scripts/test-fleet-refresh.sh \
            shared-utils/fleet_refresh_runner.py \
            shared-utils/cc_compat.py \
            shared-utils/resolve_injected_core_files.py \
            cc-compat.json; do
            [ -f "$f" ] || { echo "✗ PRD 1.11 artefact missing: $f"; exit 1; }
          done
          echo "✓ All PRD 1.11 artefacts present"

          # 2. Python files parse without error
          for f in \
            shared-utils/fleet_refresh_runner.py \
            shared-utils/cc_compat.py \
            shared-utils/resolve_injected_core_files.py; do
            python3 -c "import ast; ast.parse(open('$f').read())" \
              || { echo "✗ $f has syntax errors"; exit 1; }
          done
          echo "✓ PRD 1.11 Python files syntax OK"

          # 3. Bash scripts syntax check
          bash -n scripts/fleet-refresh.sh \
            || { echo "✗ fleet-refresh.sh has bash syntax errors"; exit 1; }
          bash -n scripts/test-fleet-refresh.sh \
            || { echo "✗ test-fleet-refresh.sh has bash syntax errors"; exit 1; }
          echo "✓ PRD 1.11 bash scripts syntax OK"

          # 4. cc-compat.json is valid JSON, satisfies schema, and onboardingVersion == /version
          python3 shared-utils/cc_compat.py --self-test cc-compat.json \
            || { echo "✗ cc-compat.json validation failed"; exit 1; }
          REPO_VER=$(head -1 version | tr -d '[:space:]')
          CC_VER=$(python3 -c "import json; print(json.load(open('cc-compat.json'))['onboardingVersion'])")
          if [ "$CC_VER" != "$REPO_VER" ]; then
            echo "✗ cc-compat.json onboardingVersion ($CC_VER) != /version ($REPO_VER)"
            echo "Fix: update cc-compat.json onboardingVersion when bumping the repo version."
            exit 1
          fi
          echo "✓ cc-compat.json schema valid; onboardingVersion=$CC_VER matches /version"

          echo "✓ PRD 1.11 fleet-refresh artefacts pass all checks"

      # PRD 1.11: Injected-core-files CI guard.
      # FAIL the build if any script writes a CEO/agent core file by a
      # hardcoded agents/<id>/ path instead of resolving through
      # resolve_injected_core_files().
      - name: PRD 1.11 injected-core-files CI guard (no direct agents/id/CORE.md writes)
        shell: bash
        run: |
          set -uo pipefail
          # Scan Python and shell scripts for direct agents/<id>/CORE.md paths.
          # Allow-list: sessions/ reads, auth-profiles, test/fixture paths, archive.
          VIOLATIONS=\$(git grep -nE \
            'agents/(main|[a-z-]+)/(SOUL|IDENTITY|MEMORY|AGENTS|TOOLS|USER|HEARTBEAT)\.md' \
            -- '*.py' '*.sh' \
            | grep -vE '(archive/|/sessions/|auth-profiles|\.telegram-sent|test-|fixtures/|\.bak)' \
            || true)
          if [ -n "\$VIOLATIONS" ]; then
            echo "✗ PRD 1.11 violation — direct agents/<id>/CORE.md write detected:"
            echo "\$VIOLATIONS" | sed 's/^/    /'
            echo ""
            echo "Fix: use resolve_injected_core_files() from shared-utils/ to get"
            echo "the gateway-injected paths. Writing directly to agents/<id>/SOUL.md"
            echo "was the v11.3.2 Layer-3 bug (wrong file, never in context)."
            exit 1
          fi
          echo "✓ PRD 1.11 injected-core-files guard: no direct agents/<id>/CORE.md writes"

      # PRD 1.11: resolve_injected_core_files.py self-test (fixture)
      - name: PRD 1.11 resolve_injected_core_files self-test
        shell: python {0}
        run: |
          import sys, os, json, tempfile
          from pathlib import Path
          sys.path.insert(0, 'shared-utils')
          from resolve_injected_core_files import resolve_injected_core_files

          with tempfile.TemporaryDirectory() as td:
              td = Path(td)
              root = td / ".openclaw"
              root.mkdir()
              (root / "workspace").mkdir()

              # Step-3 default
              os.environ["FLEET_REFRESH_ROOT"] = str(td)
              os.environ.pop("OC_JSON", None)
              r = resolve_injected_core_files("main")
              assert r["resolved_from"] == "default", f"expected default, got {r['resolved_from']}"

              # Step-2 override
              ws2 = td / "custom-ws"
              ws2.mkdir()
              cfg = td / "openclaw.json"
              cfg.write_text(json.dumps({"agents": {"defaults": {"workspace": str(ws2)}, "list": []}}))
              os.environ["OC_JSON"] = str(cfg)
              r2 = resolve_injected_core_files("main")
              assert r2["workspace"].resolve() == ws2.resolve()
              assert r2["resolved_from"] == "agents.defaults.workspace"

              # Step-1 per-agent wins
              ws1 = td / "per-agent-ws"
              ws1.mkdir()
              cfg.write_text(json.dumps({"agents": {
                  "defaults": {"workspace": str(ws2)},
                  "list": [{"id": "main", "workspace": str(ws1)}]
              }}))
              r3 = resolve_injected_core_files("main")
              assert r3["workspace"].resolve() == ws1.resolve()
              assert r3["resolved_from"] == "agents.list[main].workspace"

              # soul_md must NOT be agents/main/SOUL.md
              agents_path = str(root / "agents" / "main" / "SOUL.md")
              assert str(r3["soul_md"]) != agents_path, "Layer-3 bug: soul_md is agents/main/SOUL.md"

              os.environ.pop("OC_JSON", None)
              os.environ.pop("FLEET_REFRESH_ROOT", None)

          print("✓ resolve_injected_core_files: 3-step priority + Layer-3 guard all pass")

      # PRD 1.11: cc_compat.py self-test
      - name: PRD 1.11 cc_compat.py self-test
        shell: python {0}
        run: |
          import sys, json, tempfile
          from pathlib import Path
          sys.path.insert(0, 'shared-utils')
          from cc_compat import load_cc_compat, resolve_cc_tag, assert_min_version

          with tempfile.TemporaryDirectory() as td:
              td = Path(td)
              (td / "cc-compat.json").write_text(json.dumps({
                  "schemaVersion": 1,
                  "onboardingVersion": "v11.5.0",
                  "commandCenter": {
                      "minVersion": "v4.12.0",
                      "maxVersion": None,
                      "repo": "trevorotts1/blackceo-command-center",
                      "pinnedTag": "v4.14.0"
                  },
                  "notes": ""
              }))
              compat = load_cc_compat(td)
              tag = resolve_cc_tag(compat)
              assert tag == "v4.14.0", f"pinnedTag expected v4.14.0, got {tag}"

              tag2 = resolve_cc_tag(compat, available_tags=["v4.10.0", "v4.15.0"])
              # pinnedTag set, so ignore available_tags
              assert tag2 == "v4.14.0"

              try:
                  assert_min_version("v4.10.0", compat)
                  raise AssertionError("Should have raised for v4.10.0 < v4.12.0")
              except ValueError:
                  pass  # expected

          print("✓ cc_compat.py self-test passed")
